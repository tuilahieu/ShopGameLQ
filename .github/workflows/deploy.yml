name: Deploy Fullstack App to VPS

on:
  push:
    branches:
      - main # Hoặc master tùy theo nhánh chính của bạn

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout mã nguồn từ GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Thiết lập Node.js để build frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # 3. Cài đặt thư viện và Build frontend (để tạo thư mục frontend/dist)
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # 4. SSH & Triển khai lên VPS (Sử dụng Git pull trực tiếp trên VPS)
      # Đây là phương pháp tối ưu và nhanh nhất cho VPS.
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}          # IP của VPS
          username: ${{ secrets.VPS_USERNAME }}  # Username đăng nhập VPS (e.g. root)
          key: ${{ secrets.VPS_SSH_KEY }}        # Private SSH Key dùng để đăng nhập
          port: ${{ secrets.VPS_PORT || 22 }}    # Cổng SSH (mặc định là 22)
          script: |
            # Di chuyển vào thư mục dự án trên VPS
            cd /path/to/your/project-directory
            
            # Kéo code mới nhất từ github về
            git pull origin main
            
            # 1. Cấu hình Backend
            cd backend
            npm install --production
            
            # 2. Cấu hình Frontend
            cd ../frontend
            npm install
            npm run build
            
            # 3. Khởi động lại ứng dụng backend bằng PM2
            cd ../backend
            pm2 restart all || pm2 start src/app.js --name "shop-game-backend"
