name: Deploy Fullstack App to VPS

on:
  push:
    branches:
      - main # Hoặc master tùy theo nhánh chính của bạn

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout mã nguồn từ GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Thiết lập Node.js để build frontend
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      # 3. Cài đặt thư viện và TỰ BUILD FRONTEND trên GitHub Server (Tạo thư mục frontend/dist)
      - name: Build Frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd frontend
          npm install
          npm run build

      # 4. SSH vào VPS để kéo code Backend mới nhất (Git pull)
      - name: Pull Backend Code on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/SHOPGAME
            # Kéo code từ git (sẽ cập nhật backend & code nguồn frontend, riêng thư mục frontend/dist bị gitignore nên không đổi)
            git pull origin main

            # Cài đặt thư viện cho backend
            cd backend
            npm install --production

      # 5. TỰ ĐỘNG ĐẨY THƯ MỤC BUILD (dist) TỪ GITHUB LÊN VPS (Thay thế thư mục dist cũ)
      # Giúp VPS không cần chạy lệnh build nặng nhọc (tiết kiệm RAM/CPU)
      - name: Copy Frontend Build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "frontend/dist/"
          target: "/var/www/SHOPGAME/"
          strip_components: 0 # Giữ nguyên cấu trúc thư mục frontend/dist

      # 6. Khởi động lại Server Backend trên VPS qua PM2
      - name: Restart PM2 Service on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/SHOPGAME/backend
            pm2 restart all || pm2 start src/app.js --name "shop-game-backend"
